name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run validation suite
        run: npm test

      - name: Verify checksums
        run: npm run checksums:check

      - name: Check whitespace
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
          elif [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            git show --check --oneline --no-renames "${{ github.sha }}"
          else
            git diff --check "${{ github.event.before }}..${{ github.sha }}"
          fi
